name: Sync Team to CF KV

on:
  schedule:
    - cron: '0 0 * * *'   # Mỗi ngày 7g sáng VN (00:00 UTC)
  workflow_dispatch:       # Chạy thủ công

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Sync team emails to CF KV
        env:
          GOOGLE_TOKEN_JSON:  ${{ secrets.GOOGLE_TOKEN_JSON }}
          SHEETS_ID:          ${{ secrets.SHEETS_ID }}
          CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          cd scripts
          python - <<'EOF'
          import os, json, requests
          from sheets_manager import get_team

          # Lấy team từ Google Sheets
          team = get_team()
          emails = [p['email'] for p in team]
          print(f"Team: {emails}")

          # Ghi vào CF KV
          cf_account = os.environ['CF_ACCOUNT_ID']
          cf_token   = os.environ['CF_API_TOKEN']
          kv_ns      = os.environ['CF_KV_NAMESPACE_ID']

          r = requests.put(
            f"https://api.cloudflare.com/client/v4/accounts/{cf_account}/storage/kv/namespaces/{kv_ns}/values/team:emails",
            headers={"Authorization": f"Bearer {cf_token}"},
            data=json.dumps(emails)
          )
          if r.status_code in (200, 201):
            print(f"✓ Synced {len(emails)} emails to CF KV")
          else:
            print(f"❌ CF KV error: {r.text}")
            exit(1)
          EOF
